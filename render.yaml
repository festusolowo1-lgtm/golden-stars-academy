services:
  - type: web
    name: golden-stars-academy
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        value: GoldenStars-Render-2026-SecureKey
      - key: PYTHON_VERSION
        value: "3.11.9"